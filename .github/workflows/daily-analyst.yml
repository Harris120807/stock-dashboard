name: Daily analyst prefetch

on:
  schedule:
    - cron: "0 12 * * 1-5"   # pre-market
  workflow_dispatch:
    inputs:
      full:
        description: "Fetch the FULL universe instead of today's rotation bucket (seeding; ~45 min)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: dashboard-state
  cancel-in-progress: false

jobs:
  prefetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # rotation ~13 min at 380 tickers; FULL seeding ~45 min (weekday rotation added 2026-07-22)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/state
          path: state

      - name: Fetch analyst + earnings data (80 tickers)
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FULL: ${{ inputs.full && '1' || '0' }}
        run: |
          STATE_DIR=state OUT_DIR=out python3 state/scripts/daily_analyst.py

      - name: Push analyst state
        run: |
          cd state
          git config user.email "pipeline@claude.local"
          git config user.name "Stock Dashboard Pipeline"
          git add analyst-state.json news-state.json fundamentals-state.json
          git diff --cached --quiet && exit 0
          git commit -q -m "analyst-state: daily prefetch $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin claude/state || { git pull --rebase origin claude/state && git push origin claude/state; }
